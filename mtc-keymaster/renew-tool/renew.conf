[renewal]
# MTC CA server URL
server = http://localhost:8443

# Local certificate store
tpm_dir = ~/.TPM

# Renew certificates this many days before expiry
renew_days_before = 30

# Validity period for renewed certificates (days)
validity_days = 90

# Generate fresh keys on renewal (true) or reuse existing keys (false)
rotate_keys = false

# Key algorithm for new keys (only used when rotate_keys = true)
key_algorithm = EC-P256

# Set to true to check without actually renewing
dry_run = false

[neon]
# Query the Neon PostgreSQL database for certificates not in ~/.TPM
enabled = false

# File containing MERKLE_NEON connection string
env_file = ~/.env

# Environment variable name for the connection string
env_var = MERKLE_NEON

[hooks]
# Shell commands to run before/after renewal or on error.
# The subject name is passed as $MTC_SUBJECT, index as $MTC_INDEX.

# Run before each certificate renewal (e.g., pause a service)
pre_renew =

# Run after each successful renewal (e.g., reload a service)
# post_renew = systemctl reload mtc-ca
post_renew =

# Run if a renewal fails
on_error =

[logging]
# Log level: DEBUG, INFO, WARNING, ERROR
level = INFO

# Log to file (empty = stderr only)
# file = /var/log/mtc-renew.log
file =
